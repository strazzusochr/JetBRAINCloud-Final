name: ☁️ Cloud Deploy (Zero-Footprint)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror-gitlab:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 🦊 Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git remote add gitlab https://strazzusochr:$GITLAB_TOKEN@gitlab.com/strazzusochr/jetbrain.git
          git push --force gitlab main
