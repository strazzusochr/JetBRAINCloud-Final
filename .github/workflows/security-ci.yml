name: security-ci-homepc

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22.13.0'
  CI: 'true'

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm exec vitest run

      - name: Build
        run: npm run build

  audit:
    runs-on: ubuntu-24.04
    needs: quality
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: npm audit
        run: npm audit --audit-level=high

  sbom:
    runs-on: ubuntu-24.04
    needs: audit
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Generate SBOM
        run: npm sbom --sbom-format spdx > sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  memory_log_validation:
    runs-on: ubuntu-24.04
    needs: sbom
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Validate memory logs
        run: |
          if npm run | grep -q "security:memory-validate"; then
            npm run security:memory-validate
          else
            echo "security:memory-validate nicht gefunden - wird übersprungen"
          fi

  trivy:
    runs-on: ubuntu-24.04
    needs: memory_log_validation
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install Trivy
        run: |
          mkdir -p $HOME/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $HOME/bin v0.69.2
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Trivy filesystem scan
        run: |
          trivy fs --exit-code 0 --severity HIGH,CRITICAL --format sarif --output trivy-fs.sarif .

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build image
        run: docker build -t god-universe-matrixx:${{ github.sha }} .

      - name: Trivy image scan
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL --format sarif --output trivy-image.sarif god-universe-matrixx:${{ github.sha }}

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  snyk:
    runs-on: ubuntu-24.04
    needs: trivy
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Snyk scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk Token fehlt
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN nicht gesetzt - Snyk-Scan übersprungen"
